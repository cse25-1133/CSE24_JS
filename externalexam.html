<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Marks Calculator</title>
  <link rel="stylesheet" href="externalexam.css">
</head>

<body>

  <div class="card">
    <h1>📊 Marks Calculator</h1>
    <p>Enter marks of 4 subjects</p>

    <input type="number" class="marks" placeholder="Subject 1">
    <input type="number" class="marks" placeholder="Subject 2">
    <input type="number" class="marks" placeholder="Subject 3">
    <input type="number" class="marks" placeholder="Subject 4">

    <button onclick="calculate()">Calculate Result</button>

    <div id="result"></div>
  </div>

  <script src="externalexam.js"></script>

</body>
</html>
